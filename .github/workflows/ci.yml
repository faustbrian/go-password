name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  GOFLAGS: -mod=readonly

jobs:
  test:
    name: Test Go ${{ matrix.go }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: [1.26.x, stable]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: go.sum
      - run: go test ./...

  quality:
    name: Format, docs, vet, boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
          cache-dependency-path: go.sum
      - run: make format docs vet boundaries portability

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
          cache-dependency-path: go.sum
      - run: make coverage

  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
          cache-dependency-path: go.sum
      - run: make race

  resource-stress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
          cache-dependency-path: go.sum
      - run: make resource

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
          cache-dependency-path: go.sum
      - run: make fuzz
        env:
          FUZZ_TIME: 10s

  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
          cache-dependency-path: go.sum
      - run: make mutation

  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
          cache-dependency-path: go.sum
      - run: make bench kubernetes-bench

  interoperability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
          cache-dependency-path: go.sum
      - run: sudo apt-get update && sudo apt-get install -y php-cli
      - run: make interoperability

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
          cache-dependency-path: go.sum
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
          cache-dependency-path: go.sum
      - run: make staticcheck
      - name: NilAway advisory
        run: make nilaway

  vulnerability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
          cache-dependency-path: go.sum
      - run: |
          . ./tools/versions.env
          go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"
      - run: make vuln

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
          cache-dependency-path: go.sum
      - run: make api

  workflow-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
      - run: |
          . ./tools/versions.env
          go install "github.com/rhysd/actionlint/cmd/actionlint@${ACTIONLINT_VERSION}"
          go install "github.com/zricethezav/gitleaks/v8@${GITLEAKS_VERSION}"
      - run: make workflows
        env:
          SHELLCHECK_CONTAINER: "1"

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
