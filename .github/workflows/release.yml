name: Release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

permissions:
  contents: write

env:
  GOFLAGS: -mod=readonly

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
          cache-dependency-path: go.sum
      - name: Install pinned local-gate tools
        run: |
          . ./tools/versions.env
          go install "github.com/rhysd/actionlint/cmd/actionlint@${ACTIONLINT_VERSION}"
          go install "github.com/zricethezav/gitleaks/v8@${GITLEAKS_VERSION}"
          go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"
      - run: sudo apt-get update && sudo apt-get install -y php-cli
      - run: test "$(git cat-file -t "$GITHUB_REF_NAME")" = tag
      - run: ./scripts/release-notes.sh "$GITHUB_REF_NAME" > release-notes.md
      - run: make release-check VERSION="$GITHUB_REF_NAME" REF="$GITHUB_REF_NAME"
        env:
          SHELLCHECK_CONTAINER: "1"
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          dist/*
          --verify-tag
          --title "$GITHUB_REF_NAME"
          --notes-file release-notes.md
